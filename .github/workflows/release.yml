name: Release

# Pushing a version tag (v0.2.0, …) publishes that version to npm.
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret to leak or rotate.
# One-time setup on npmjs.com → @pinecall/react-native → Settings → Trusted Publisher:
#   repository pinecall/react-native · workflow release.yml · environment npm
# Until that's configured this job fails at the publish step; nothing else breaks.
#
# Deps install with yarn 4 (see ci.yml); the publish itself uses npm, because
# `npm publish --provenance` is what speaks OIDC to the registry.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
      - name: tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          [ "$TAG" = "$PKG" ] || { echo "::error::tag v$TAG != package.json $PKG"; exit 1; }

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write        # OIDC, for Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --immutable
      - run: yarn prepare          # bob build → lib/, which `files` publishes
      # Trusted Publishing (OIDC registry auth) needs npm >= 11.5.1 — the
      # runner's bundled npm (10.x on Node 22) predates the feature entirely
      # and silently falls back to an anonymous publish, which 404s.
      - run: npm install -g npm@latest && npm --version
      - name: publish
        run: |
          case "${GITHUB_REF_NAME}" in
            *-*) TAG=beta ;;
            *)   TAG=latest ;;
          esac
          echo "publishing to dist-tag: $TAG"
          npm publish --provenance --access public --tag "$TAG"
