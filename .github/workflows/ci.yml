name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # this repo is yarn 4 (packageManager: yarn@4.11.0, yarn.lock, workspaces)
      # — npm ci cannot install it
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint
